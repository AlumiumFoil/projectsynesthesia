<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synesthesia Sketchpad</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .upload-area {
            background: rgba(255, 255, 255, 0.2);
            border: 2px dashed white;
            border-radius: 20px;
            padding: 40px;
            margin: 20px 0;
            cursor: pointer;
            transition: background 0.3s;
        }
        .upload-area:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        input[type="file"] {
            display: none;
        }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .file-info {
            margin: 20px 0;
            font-size: 14px;
            opacity: 0.9;
        }
        .status {
            margin: 20px 0;
            font-size: 16px;
            padding: 10px;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
        }
        img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .features {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 14px;
            text-align: left;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Project Synesthesia</h1>
        <p>Turn audio into art</p>
        
        <div class="upload-area" id="uploadArea">
            <p>Click or drag an audio file here</p>
            <p style="font-size: 12px; margin-top: 10px;">Supports: MP3, WAV, OGG, M4A (max 10MB)</p>
        </div>

        <input type="file" id="fileInput" accept="audio/*">
        
        <div class="file-info" id="fileInfo"></div>

        <div style="background: rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 20px; margin: 20px 0;">
            <h3 style="margin-bottom: 15px;">Song Information (Optional)</h3>
            <p style="font-size: 12px; opacity: 0.8;">Helps find lyrics for better artwork</p>
            
            <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
                <div>
                    <label style="display: block; font-size: 12px; margin-bottom: 5px;">Song Title</label>
                    <input type="text" id="songTitle" placeholder="Enter song title" 
                        style="padding: 8px; border-radius: 5px; border: none; width: 200px;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; margin-bottom: 5px;">Artist Name</label>
                    <input type="text" id="songArtist" placeholder="Enter artist name" 
                        style="padding: 8px; border-radius: 5px; border: none; width: 200px;">
                </div>
            </div>
        </div>
        
        <button id="generateBtn" disabled>Generate Artwork</button>
        
        <div class="status" id="status">Select an audio file to begin</div>
        
        <div id="resultContainer"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const generateBtn = document.getElementById('generateBtn');
        const statusDiv = document.getElementById('status');
        const fileInfo = document.getElementById('fileInfo');
        const resultContainer = document.getElementById('resultContainer');
        
        let currentFile = null;
        
        // Click upload area to trigger file selection
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });
        
        // Handle drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = 'rgba(255, 255, 255, 0.4)';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = 'rgba(255, 255, 255, 0.2)';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = 'rgba(255, 255, 255, 0.2)';
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        // Handle file selection via input
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
                // Clear the input value so the same file can be selected again if needed
                fileInput.value = '';
            }
        });
        
        function handleFile(file) {
            if (!file.type.startsWith('audio/')) {
                statusDiv.innerHTML = 'Error: Please select an audio file';
                return;
            }
            
            if (file.size > 10 * 1024 * 1024) {
                statusDiv.innerHTML = 'Error: File too large (max 10MB)';
                return;
            }
            
            currentFile = file;
            fileInfo.innerHTML = `Selected: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
            generateBtn.disabled = false;
            statusDiv.innerHTML = 'Ready to generate artwork';
        }
        
        generateBtn.addEventListener('click', generateArtwork);
        
        async function generateArtwork() {
            if (!currentFile) {
                statusDiv.innerHTML = 'Please select an audio file first';
                return;
            }
            
            generateBtn.disabled = true;
            statusDiv.innerHTML = 'Analyzing audio and generating artwork...';
            resultContainer.innerHTML = '';
            
            // Create a new FormData object for each request
            const formData = new FormData();
            formData.append('audio', currentFile);

            // Get optional song info from user inputs
            const songTitleValue = document.getElementById('songTitle').value.trim();
            const songArtistValue = document.getElementById('songArtist').value.trim();
            
            if (songTitleValue) {
                formData.append('song_title', songTitleValue);
            }
            if (songArtistValue) {
                formData.append('song_artist', songArtistValue);
            }
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    if (data.image_url) {
                        const img = document.createElement('img');
                        img.alt = 'Generated artwork';
                        img.style.maxWidth = '100%';
                        img.style.borderRadius = '10px';
                        img.style.marginTop = '20px';
                        img.style.boxShadow = '0 10px 40px rgba(0,0,0,0.2)';
                        
                        img.onload = () => {
                            let lyricsStatus = '';
                            if (data.keywords) {
                                lyricsStatus = `<div class="features" style="margin-top: 10px;">
                                                    Lyrics keywords: ${data.keywords}
                                                </div>`;
                            } else if (data.has_lyrics === false) {
                                lyricsStatus = `<div class="features" style="margin-top: 10px;">
                                                    No lyrics found - using audio-only analysis
                                                </div>`;
                            }

                            statusDiv.innerHTML = `
                                Artwork generated successfully
                                <div class="features">
                                    Tempo: ${data.features.tempo} BPM<br>
                                    Brightness: ${data.features.centroid}<br>
                                    Texture: ${data.features.zcr}<br>
                                    Volume: ${data.features.volume}
                                </div>
                            `;
                        };
                        
                        img.onerror = () => {
                            statusDiv.innerHTML = `
                                Image failed to load, but audio was analyzed.
                                <div class="features">
                                    Tempo: ${data.features.tempo} BPM<br>
                                    Brightness: ${data.features.centroid}<br>
                                    Texture: ${data.features.zcr}<br>
                                    Volume: ${data.features.volume}
                                </div>
                            `;
                            
                            const fallbackDiv = document.createElement('div');
                            fallbackDiv.style.width = '512px';
                            fallbackDiv.style.height = '512px';
                            fallbackDiv.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                            fallbackDiv.style.borderRadius = '10px';
                            fallbackDiv.style.marginTop = '20px';
                            fallbackDiv.style.display = 'flex';
                            fallbackDiv.style.alignItems = 'center';
                            fallbackDiv.style.justifyContent = 'center';
                            fallbackDiv.style.color = 'white';
                            fallbackDiv.innerHTML = 'Artwork preview (generation pending)';
                            resultContainer.appendChild(fallbackDiv);
                        };
                        
                        img.src = data.image_url;
                        resultContainer.appendChild(img);
                    } else if (data.features) {
                        statusDiv.innerHTML = `
                            Audio analyzed successfully
                            <div class="features">
                                Tempo: ${data.features.tempo} BPM<br>
                                Brightness: ${data.features.centroid}<br>
                                Texture: ${data.features.zcr}<br>
                                Volume: ${data.features.volume}
                            </div>
                        `;
                    }
                } else {
                    statusDiv.innerHTML = 'Error: ' + data.message;
                }
            } catch (error) {
                statusDiv.innerHTML = 'Error: Could not connect to backend. Make sure the server is running.';
                console.error('Fetch error:', error);
            } finally {
                generateBtn.disabled = false;
            }
        }
        
        // Test backend connection on page load
        async function testBackend() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                console.log('Backend connected:', data);
            } catch (error) {
                console.error('Backend not reachable:', error);
                statusDiv.innerHTML = 'Backend not connected. Run python app.py';
            }
        }
        
        testBackend();
    </script>
</body>
</html>
