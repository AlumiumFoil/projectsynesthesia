<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synesthesia Sketchpad</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px 0;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            margin: 20px 0;
            font-size: 16px;
        }
        img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Project Synesthesia</h1>
        <p>Turn audio into art</p>
        
        <button id="recordBtn">Record 3 Seconds</button>
        
        <div class="status" id="status">Ready to record</div>
        
        <div id="imageContainer"></div>
    </div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const statusDiv = document.getElementById('status');
        const imageContainer = document.getElementById('imageContainer');
        
        let mediaRecorder = null;
        let audioChunks = [];
        
        recordBtn.addEventListener('click', startRecording);
        
        async function startRecording() {
            try {
                // Request microphone access
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    statusDiv.textContent = 'Generating artwork...';
                    
                    // Create audio blob
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const formData = new FormData();
                    formData.append('audio', audioBlob);
                    
                    // Send to backend
                    try {
                        const response = await fetch('/api/generate', {
                            method: 'POST',
                            body: formData
                        });
                        const data = await response.json();
                        
                        if (data.success) {
                            if (data.image_url) {
                                // Clear previous image
                                imageContainer.innerHTML = '';

                                // Create a new image element
                                const img = document.createElement('img');
                                img.alt = 'Generated artwork';
                                img.style.maxWidth = '100%';
                                img.style.borderRadius = '10px';
                                img.style.marginTop = '20px';
                                img.style.boxShadow = '0 10px 40px rgba(0,0,0,0.2)';

                                statusDiv.innerHTML = 'Loading generated image...';

                                // Set up an image load handler
                                img.onload = () => {
                                    statusDiv.innerHTML = `Artwork generated.<br>
                                        Tempo: ${data.features.tempo} BPM | 
                                        Brightness: ${data.features.centroid}<br>
                                        Texture: ${data.features.zcr} | 
                                        Volume: ${data.features.volume}<br><br>
                                        <small>${data.prompt.substring(0, 80)}...</small>`;
                                };

                                // Handle image loading errors
                                img.onerror = () => {
                                    console.error('Image failed to load:', data.image_url);
                                    statusDiv.innerHTML = `
                                        Image failed to load.<br><br>
                                        Audio Features (extracted successfully):<br>
                                        Tempo: ${data.features.tempo} BPM | 
                                        Brightness: ${data.features.centroid}<br>
                                        Texture: ${data.features.zcr} | 
                                        Volume: ${data.features.volume}<br><br>
                                        Try recording again with a different sound.<br>
                                        <small>Prompt used: "${data.prompt.substring(0, 150)}..."</small>
                                    `;
                    
                                    // Create a fallback colored square based on audio features
                                    const fallbackDiv = document.createElement('div');
                    
                                    // Calculate colors based on audio features
                                    const hue = (data.features.centroid % 360);
                                    const saturation = Math.min(100, Math.max(30, data.features.volume * 100));
                                    const lightness = Math.min(70, Math.max(30, data.features.tempo / 240 * 70));
                    
                                    fallbackDiv.style.width = '512px';
                                    fallbackDiv.style.height = '512px';
                                    fallbackDiv.style.background = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
                                    fallbackDiv.style.borderRadius = '10px';
                                    fallbackDiv.style.marginTop = '20px';
                                    fallbackDiv.style.display = 'flex';
                                    fallbackDiv.style.alignItems = 'center';
                                    fallbackDiv.style.justifyContent = 'center';
                                    fallbackDiv.style.color = 'white';
                                    fallbackDiv.style.fontSize = '18px';
                                    fallbackDiv.style.textAlign = 'center';
                                    fallbackDiv.style.padding = '20px';
                                    fallbackDiv.style.boxShadow = '0 10px 40px rgba(0,0,0,0.2)';
                                    fallbackDiv.innerHTML = `
                                        Visual representation of your audio<br><br>
                                        ${data.features.tempo} BPM | ${data.features.centroid}<br><br>
                                        (Image generation pending - try again)
                                    `;
                    
                                    imageContainer.appendChild(fallbackDiv);
                                };

                                // Set the image source after setting up event handlers
                                img.src = data.image_url;
                                imageContainer.appendChild(img);

                            } else if (data.features) {
                                // Fallback: Show just the features if no image URL
                                statusDiv.innerHTML = `
                                    Audio analyzed successfully!<br><br>
                                    Extracted Features:<br>
                                    Tempo: ${data.features.tempo} BPM<br>
                                    Spectral Centroid (Brightness): ${data.features.centroid}<br>
                                    Zero Crossing Rate (Texture): ${data.features.zcr}<br>
                                    Volume: ${data.features.volume}<br><br>
                                    Image generation will be added soon!
                                `;
                            } else {
                                statusDiv.textContent = 'Unexpected response from server';
                            }
                        } else {
                            // Handle server error
                            statusDiv.innerHTML = `Error: ${data.message}<br><br>Please try recording again.`;
                            console.error('Server error:', data);
                        }

                    } catch (error) {
                        statusDiv.innerHTML = 'Network error: Could not connect to backend.<br><br>Make sure the Flask server is running.';
                        console.error('Fetch error:', error);
                    }
                    
                    // Stop all microphone tracks
                    stream.getTracks().forEach(track => track.stop());
                };
                
                // Start recording
                mediaRecorder.start();
                statusDiv.textContent = 'Recording... (3 seconds)';
                
                // Stop after 3 seconds
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                    }
                }, 3000);
                
            } catch (error) {
                statusDiv.textContent = 'Error: Could not access microphone';
                console.error(error);
            }
        }
        
        // Test backend connection on page load
        async function testBackend() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                console.log('Backend connection:', data);
            } catch (error) {
                console.error('Backend not reachable:', error);
            }
        }
        
        testBackend();
    </script>
</body>
</html>
