<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Synesthesia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
</head>
<body>
    <div class="page">
        <div class="hero">
            <h1>Project Synesthesia</h1>
            <p>Turn audio into art</p>
        </div>

        <div class="two-column">
            <!-- LEFT COLUMN -->
            <div class="left-column">
                <!-- Upload Area -->
                <div class="panel">
                    <h2>Audio File Upload</h2>
                    <div class="toolbar">
                        <div class="file-btn" id="uploadArea">
                            Select Audio File
                            <input type="file" id="fileInput" accept="audio/*">
                        </div>
                        <button id="generateBtn" disabled>Generate Artwork</button>
                    </div>
                    <div class="file-info" id="fileInfo"></div>
                </div>

                <!-- Song Information -->
                <div class="panel">
                    <h2>Additional Song Information <span class="hint">(optional, improves results)</span></h2>
                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <input type="text" id="songTitle" placeholder="Song Title" 
                            style="width: 100%; background: var(--border); border: none; padding: 0.65rem; border-radius: 10px; color: var(--text);">
                        <input type="text" id="songArtist" placeholder="Artist Name" 
                            style="width: 100%; background: var(--border); border: none; padding: 0.65rem; border-radius: 10px; color: var(--text);">
                    </div>
                </div>

                <!-- Status -->
                <div class="panel">
                    <h2>Analysis results</h2>
                    <div class="status" id="status">Select an audio file to begin</div>
                    <div id="analysisDetails" style="display: none; margin-top: 1rem;"></div>
                </div>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="right-column">
                <!-- Audio Preview (Waveform + Player) -->
                <div class="panel" id="audioPreviewPanel" style="display: none;">
                    <h2>Audio Preview</h2>
                    <div id="waveform-host" style="min-height: 100px; margin-bottom: 1rem;"></div>
                    <audio id="audioPlayer" controls style="width: 100%; border-radius: 10px;"></audio>
                </div>

                <!-- Results -->
                <div class="panel" id="resultPanel">
                    <h2>Generated Artwork</h2>
                    <div id="resultContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const generateBtn = document.getElementById('generateBtn');
        const statusDiv = document.getElementById('status');
        const fileInfo = document.getElementById('fileInfo');
        const resultContainer = document.getElementById('resultContainer');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioPreviewPanel = document.getElementById('audioPreviewPanel');
        let currentAudioUrl = null;
        
        let waveformPeaks = null;
        let currentFile = null;
        
        // Waveform functions
        async function fileToAudioBuffer(file) {
            const arrayBuffer = await file.arrayBuffer();
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
            return audioBuffer;
        }
        
        function audioBufferToMono(audioBuffer) {
            const n = audioBuffer.numberOfChannels;
            const len = audioBuffer.length;
            const out = new Float32Array(len);
            for (let c = 0; c < n; c += 1) {
                const ch = audioBuffer.getChannelData(c);
                for (let i = 0; i < len; i += 1) out[i] += ch[i];
            }
            for (let i = 0; i < len; i += 1) out[i] /= n;
            return out;
        }
        
        function downsamplePeaks(data, targetPoints) {
            const n = data.length;
            if (n === 0) return [];
            const block = Math.max(1, Math.floor(n / targetPoints));
            const peaks = [];
            for (let i = 0; i < targetPoints; i += 1) {
                const start = i * block;
                let max = 0;
                const end = Math.min(start + block, n);
                for (let j = start; j < end; j += 1) {
                    const v = Math.abs(data[j]);
                    if (v > max) max = v;
                }
                peaks.push(max);
            }
            return peaks;
        }
        
        // p5.js setup function - called automatically
        function setup() {
            const host = document.getElementById('waveform-host');
            if (host) {
                const w = Math.max(320, host.clientWidth || 600);
                const h = 140;
                const cnv = createCanvas(w, h);
                cnv.parent('waveform-host');
                noLoop();
                window.synRedrawWave = () => redraw();
            }
        }
        
        // p5.js draw function - called automatically after setup
        function draw() {
            background(18, 16, 28);
            if (!waveformPeaks || waveformPeaks.length === 0) {
                noStroke();
                fill(80, 74, 110);
                textAlign(CENTER, CENTER);
                textSize(14);
                text("Select audio file to see waveform", width / 2, height / 2);
                return;
            }
            
            noFill();
            stroke(124, 92, 255);
            strokeWeight(1.2);
            const mid = height / 2;
            const step = width / waveformPeaks.length;
            beginShape();
            for (let i = 0; i < waveformPeaks.length; i += 1) {
                const x = i * step;
                const hVal = waveformPeaks[i] * (height * 0.42);
                vertex(x, mid - hVal);
            }
            for (let i = waveformPeaks.length - 1; i >= 0; i -= 1) {
                const x = i * step;
                const hVal = waveformPeaks[i] * (height * 0.42);
                vertex(x, mid + hVal);
            }
            endShape(CLOSE);
            
            stroke(255, 107, 157, 90);
            strokeWeight(1);
            line(0, mid, width, mid);
        }
        
        function windowResized() {
            const host = document.getElementById('waveform-host');
            if (!host) return;
            resizeCanvas(Math.max(320, host.clientWidth), 140);
            redraw();
        }
        
        async function handleFile(file) {
            if (!file.type.startsWith('audio/')) {
                statusDiv.innerHTML = 'Error: Please select an audio file';
                return;
            }
            
            if (file.size > 10 * 1024 * 1024) {
                statusDiv.innerHTML = 'Error: File too large (max 10MB)';
                return;
            }
            
            currentFile = file;
            fileInfo.innerHTML = `Selected: ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
            generateBtn.disabled = false;
            statusDiv.innerHTML = 'Ready to generate artwork';
            
            // Setup audio player
            setupAudioPlayer(file);
            
            // Generate waveform visualization
            try {
                const audioBuffer = await fileToAudioBuffer(file);
                const mono = audioBufferToMono(audioBuffer);
                waveformPeaks = downsamplePeaks(mono, 1800);
                if (window.synRedrawWave) window.synRedrawWave();
            } catch (err) {
                console.error('Waveform generation failed:', err);
            }
        }

        // Audio player functions
        function setupAudioPlayer(file) {
            // Revoke old URL to prevent memory leaks
            if (currentAudioUrl) {
                URL.revokeObjectURL(currentAudioUrl);
            }
            
            // Create new URL for the audio file
            currentAudioUrl = URL.createObjectURL(file);
            
            // Set the audio player source
            audioPlayer.src = currentAudioUrl;

            // Set default volume (0.0 to 1.0)
            audioPlayer.volume = 0.5;  // 50% volume
            
            // Show the combined audio preview panel
            audioPreviewPanel.style.display = 'block';
        }
        
        // Click upload area to trigger file selection
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });
        
        // Handle drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = 'rgba(255, 255, 255, 0.4)';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = 'rgba(255, 255, 255, 0.2)';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = 'rgba(255, 255, 255, 0.2)';
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        // Handle file selection via input
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
                // Clear the input value so the same file can be selected again if needed
                fileInput.value = '';
            }
        });
        
        generateBtn.addEventListener('click', generateArtwork);
        
        async function generateArtwork() {
            if (!currentFile) {
                statusDiv.innerHTML = 'Please select an audio file first';
                return;
            }
            
            generateBtn.disabled = true;
            statusDiv.innerHTML = 'Analyzing audio and generating artwork...';
            resultContainer.innerHTML = '';
            
            // Create a new FormData object for each request
            const formData = new FormData();
            formData.append('audio', currentFile);

            // Get optional song info from user inputs
            const songTitleValue = document.getElementById('songTitle').value.trim();
            const songArtistValue = document.getElementById('songArtist').value.trim();
            
            if (songTitleValue) {
                formData.append('song_title', songTitleValue);
            }
            if (songArtistValue) {
                formData.append('song_artist', songArtistValue);
            }
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if (data.success) {
                    if (data.image_url) {
                        const img = document.createElement('img');
                        img.alt = 'Generated artwork';
                        img.style.maxWidth = '100%';
                        img.style.borderRadius = '10px';
                        img.style.marginTop = '20px';
                        img.style.boxShadow = '0 10px 40px rgba(0,0,0,0.2)';
                        
                        img.onload = () => {
                            // Build analysis details HTML
                            let analysisHtml = `
                                <div class="features-grid">
                                    <div class="feature-item">
                                        <span class="feature-label">Tempo</span>
                                        <span class="feature-value">${data.features.tempo} BPM</span>
                                    </div>
                                    <div class="feature-item">
                                        <span class="feature-label">Brightness</span>
                                        <span class="feature-value">${data.features.centroid}</span>
                                    </div>
                                    <div class="feature-item">
                                        <span class="feature-label">Texture</span>
                                        <span class="feature-value">${data.features.zcr}</span>
                                    </div>
                                    <div class="feature-item">
                                        <span class="feature-label">Volume</span>
                                        <span class="feature-value">${data.features.volume}</span>
                                    </div>
                                </div>
                            `;
                            
                            // Add keywords if present
                            if (data.keywords) {
                                const keywordsArray = data.keywords.split(', ');
                                analysisHtml += `
                                    <div class="keywords-section">
                                        <div class="keywords-label">Extracted keywords</div>
                                        <div class="keywords-list">
                                            ${keywordsArray.map(k => `<span class="keyword-chip">${k}</span>`).join('')}
                                        </div>
                                    </div>
                                `;
                            } else if (data.has_lyrics === false) {
                                analysisHtml += `
                                    <div class="keywords-section">
                                        <div class="keywords-label">Lyrics</div>
                                        <div class="no-lyrics">No lyrics found - using audio-only analysis</div>
                                    </div>
                                `;
                            }
                            
                            // Update the status and analysis details
                            statusDiv.innerHTML = 'Artwork generated successfully';
                            statusDiv.classList.add('ok');
                            
                            const analysisDetails = document.getElementById('analysisDetails');
                            analysisDetails.innerHTML = analysisHtml;
                            analysisDetails.style.display = 'block';
                        };

                        // Auto-play the audio when artwork is ready
                        if (audioPlayer && audioPlayer.src) {
                            audioPlayer.play().catch(e => console.log('Auto-play prevented:', e));
                        }
                        
                        img.onerror = () => {
                            statusDiv.innerHTML = 'Image failed to load, but audio was analyzed.';
                            statusDiv.classList.add('err');
                            
                            // Still show the analysis details
                            let analysisHtml = `
                                <div class="features-grid">
                                    <div class="feature-item">
                                        <span class="feature-label">Tempo</span>
                                        <span class="feature-value">${data.features.tempo} BPM</span>
                                    </div>
                                    <div class="feature-item">
                                        <span class="feature-label">Brightness</span>
                                        <span class="feature-value">${data.features.centroid}</span>
                                    </div>
                                    <div class="feature-item">
                                        <span class="feature-label">Texture</span>
                                        <span class="feature-value">${data.features.zcr}</span>
                                    </div>
                                    <div class="feature-item">
                                        <span class="feature-label">Volume</span>
                                        <span class="feature-value">${data.features.volume}</span>
                                    </div>
                                </div>
                            `;
                            
                            const analysisDetails = document.getElementById('analysisDetails');
                            analysisDetails.innerHTML = analysisHtml;
                            analysisDetails.style.display = 'block';
                            
                            const fallbackDiv = document.createElement('div');
                            fallbackDiv.style.width = '512px';
                            fallbackDiv.style.height = '512px';
                            fallbackDiv.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                            fallbackDiv.style.borderRadius = '10px';
                            fallbackDiv.style.marginTop = '20px';
                            fallbackDiv.style.display = 'flex';
                            fallbackDiv.style.alignItems = 'center';
                            fallbackDiv.style.justifyContent = 'center';
                            fallbackDiv.style.color = 'white';
                            fallbackDiv.innerHTML = 'Artwork preview (generation pending)';
                            resultContainer.appendChild(fallbackDiv);
                        };
                        
                        img.src = data.image_url;
                        resultContainer.appendChild(img);
                    } else if (data.features) {
                        statusDiv.innerHTML = `
                            Audio analyzed successfully
                            <div class="features">
                                Tempo: ${data.features.tempo} BPM<br>
                                Brightness: ${data.features.centroid}<br>
                                Texture: ${data.features.zcr}<br>
                                Volume: ${data.features.volume}
                            </div>
                        `;
                    }
                } else {
                    statusDiv.innerHTML = 'Error: ' + data.message;
                }
            } catch (error) {
                statusDiv.innerHTML = 'Error: Could not connect to backend. Make sure the server is running.';
                console.error('Fetch error:', error);
            } finally {
                generateBtn.disabled = false;
            }
        }
        
        // Test backend connection on page load
        async function testBackend() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                console.log('Backend connected:', data);
            } catch (error) {
                console.error('Backend not reachable:', error);
                statusDiv.innerHTML = 'Backend not connected. Run python app.py';
            }
        }
        
        testBackend();
    </script>
</body>
</html>
